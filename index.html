<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNITORIEOS</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #3a0a4d, #12001a);
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* LOADING */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #12001a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.loader {
    width: 60px;
    height: 60px;
    border: 5px solid rgba(168,85,247,0.2);
    border-top: 5px solid #a855f7;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 420px;
    opacity: 0;
    transform: scale(0.95);
    transition: 0.4s ease;
}

.container.show {
    opacity: 1;
    transform: scale(1);
}

.box {
    background: rgba(255,255,255,0.05);
    border-radius: 25px;
    padding: 25px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 50px rgba(168,85,247,0.25);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.title {
    font-size: 24px;
    font-weight: 700;
}

.subtitle {
    font-size: 14px;
    opacity: 0.7;
}

.close {
    font-size: 22px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 25px;
}

.full {
    grid-column: span 2;
}

/* TOGGLE */
.toggle {
    background: rgba(255,255,255,0.05);
    padding: 18px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
    cursor: pointer;
}

.toggle:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(168,85,247,0.4);
}

/* CHECKBOX */
.check {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    border: 2px solid #a855f7;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    font-size: 18px;
}

.active .check {
    background: #a855f7;
    box-shadow: 0 0 15px #a855f7;
}

.active .check::after {
    content: "✔";
}

/* TEXT */
.label {
    font-size: 17px;
}
</style>

</head>
<body>

<!-- LOADING -->
<div id="loading">
    <div class="loader"></div>
</div>

<!-- MAIN -->
<div class="container" id="app">
    <div class="box">

        <div class="header">
            <div>
                <div class="title">MENU HEADLOCK OB53</div>
                <div class="subtitle">Developed by Hắc Vê </div>
            </div>
            <div class="close">✕</div>
        </div>

        <div class="grid">

            <div class="toggle full">
                <span class="label">Head Lock</span>
                <div class="check"></div>
            </div>

            <div class="toggle">
                <span class="label">AimBot</span>
                <div class="check"></div>
            </div>

            <div class="toggle">
                <span class="label">AimLock</span>
                <div class="check"></div>
            </div>

            <div class="toggle">
                <span class="label">Nhẹ Tâm</span>
                <div class="check"></div>
            </div>

            <div class="toggle">
                <span class="label">Fix Rung</span>
                <div class="check"></div>
            </div>

            <div class="toggle">
                <span class="label">Tối Ưu Máy</span>
                <div class="check"></div>
            </div>

            <div class="toggle">
                <span class="label">Aim Head</span>
                <div class="check"></div>
            </div>

        </div>

    </div>
</div>

<script>
// loading
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").classList.add("show");
}, 1200);

// toggle
document.querySelectorAll(".toggle").forEach(item => {
    item.addEventListener("click", () => {
        item.classList.toggle("active");
    });
});
</script>

</body>
</html>
